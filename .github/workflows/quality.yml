name: Documentation quality
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Validate repository content and publication coverage
        run: python3 scripts/validate_repo.py && python3 scripts/validate_assurance_references.py && python3 scripts/validate_data_privacy_rights.py
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate and render every Mermaid diagram
        run: python3 scripts/check_mermaid_source.py && python3 scripts/extract_mermaid.py && bash scripts/validate_mermaid.sh
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Build documentation
        run: bundle exec jekyll build --trace
      - name: Inspect generated site
        run: python3 scripts/check_built_site.py
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: ondtf-documentation-validation
          path: |
            artifacts/mermaid-rendered
            _site
