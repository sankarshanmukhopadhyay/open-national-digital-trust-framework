schema_version: '0.1'
status: preparatory
target_capability: ONDTF Guided Framework Construction
decision_points:
- id: GFC-LIF-001
  section: provider_lifecycle
  prompt: Who has authority to admit and activate providers?
  response_type: role_reference
  required: true
  maps_to:
  - provider_lifecycle.transitions.PLT-003.decision_role
  - provider_lifecycle.transitions.PLT-005.decision_role
  review:
  - governance
  - legal
- id: GFC-LIF-002
  section: provider_lifecycle
  prompt: What provider and service scope may be approved?
  response_type: structured_scope
  required: true
  maps_to:
  - conformance_claim.scope
  review:
  - governance
  - technical
- id: GFC-LIF-003
  section: provider_lifecycle
  prompt: Which changes require notification, review or reassessment?
  response_type: multi_select_with_additions
  required: true
  maps_to:
  - material_change_policy
  review:
  - technical
  - risk
- id: GFC-LIF-004
  section: provider_lifecycle
  prompt: What grounds and maximum propagation times apply to restriction, suspension
    and withdrawal?
  response_type: structured_policy
  required: true
  maps_to:
  - status_policy
  review:
  - governance
  - rights
  - technical
- id: GFC-LIF-005
  section: provider_lifecycle
  prompt: What continuity and exit obligations protect participants and affected parties?
  response_type: structured_policy
  required: true
  maps_to:
  - exit_policy
  review:
  - operations
  - rights
- id: GFC-CON-001
  section: conformance
  prompt: Which conformance claim layers will the DTF support?
  response_type: multi_select
  required: true
  allowed:
  - artefact
  - implementation
  - operational
  maps_to:
  - assessment_scheme.claim_layers
  review:
  - assurance
- id: GFC-CON-002
  section: conformance
  prompt: Which assessment methods are permitted for each claim layer?
  response_type: matrix
  required: true
  maps_to:
  - conformance_claim.assessment_method
  review:
  - assurance
  - governance
- id: GFC-CON-003
  section: conformance
  prompt: Must assessment bodies or assessors be accredited?
  response_type: conditional_boolean
  required: true
  maps_to:
  - assessment_scheme.accreditation
  review:
  - governance
- id: GFC-CON-004
  section: conformance
  prompt: What evidence, validity and surveillance rules apply?
  response_type: structured_policy
  required: true
  maps_to:
  - assessment_scheme.evidence
  - assessment_scheme.surveillance
  review:
  - assurance
  - operations
- id: GFC-CON-005
  section: conformance
  prompt: Who makes final decisions and hears appeals?
  response_type: role_pair
  required: true
  maps_to:
  - assessment_scheme.decision_role
  - assessment_scheme.appeal_role
  review:
  - governance
  - rights
- id: GFC-ASR-001
  section: assurance
  prompt: Which assurance dimensions are required for each use case?
  response_type: use_case_dimension_matrix
  required: true
  maps_to:
  - assurance_profile.required_dimensions
  review:
  - assurance
  - risk
- id: GFC-ASR-002
  section: assurance
  prompt: What minimum level applies to each required dimension?
  response_type: dimension_level_matrix
  required: true
  maps_to:
  - assurance_profile.minimum_levels
  review:
  - assurance
- id: GFC-ASR-003
  section: assurance
  prompt: Which dimensions are critical and cannot be compensated by other evidence?
  response_type: multi_select_by_use_case
  required: true
  maps_to:
  - assurance_profile.critical_dimensions
  review:
  - assurance
  - governance
- id: GFC-ASR-004
  section: assurance
  prompt: What evidence, freshness and uncertainty rules apply to each dimension?
  response_type: structured_matrix
  required: true
  maps_to:
  - assurance_profile.evidence_rules
  - assurance_profile.freshness
  review:
  - assurance
  - technical
- id: GFC-ASR-005
  section: assurance
  prompt: What outcome applies when a critical dimension is not established?
  response_type: conditional_policy
  required: true
  maps_to:
  - assurance_profile.failure_action
  review:
  - risk
  - operations
  - rights
- id: GFC-RGT-001
  section: rights
  prompt: Which affected-party classes and material harms must the framework recognise?
  response_type: structured_catalogue
  required: true
  maps_to:
  - rights_profile.affected_parties
  - rights_profile.harms
  review:
  - rights
  - governance
- id: GFC-RGT-002
  section: rights
  prompt: What notice and explanation must accompany material or adverse decisions?
  response_type: structured_policy
  required: true
  maps_to:
  - rights_profile.notice
  - rights_profile.explanation
  review:
  - rights
  - legal
- id: GFC-RGT-003
  section: rights
  prompt: How can evidence and decisions be challenged and corrected?
  response_type: process_definition
  required: true
  maps_to:
  - rights_profile.challenge
  - rights_profile.correction
  review:
  - rights
  - operations
- id: GFC-RGT-004
  section: rights
  prompt: Who provides independent appeal and what powers does that body possess?
  response_type: role_and_power_definition
  required: true
  maps_to:
  - rights_profile.appeal
  review:
  - governance
  - rights
  - legal
- id: GFC-RGT-005
  section: rights
  prompt: Which remedies, accessibility measures and alternative channels are mandatory?
  response_type: structured_policy
  required: true
  maps_to:
  - rights_profile.remedy
  - rights_profile.accessibility
  - rights_profile.alternatives
  review:
  - rights
  - accessibility
  - operations
