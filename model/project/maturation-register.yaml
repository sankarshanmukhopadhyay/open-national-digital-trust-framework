external_framework_families:
- id: EFF-01
  name: Regulatory trust-service frameworks
  examples:
  - eIDAS and the EU Digital Identity Framework
  use: Legal effect, supervision, qualified status and cross-border recognition patterns.
- id: EFF-02
  name: National digital identity trust frameworks
  examples:
  - UK Digital Verification Services Trust Framework
  - Australian Digital ID framework
  - New Zealand Digital Identity Services Trust Framework
  use: Provider obligations, accreditation, registers, trustmarks, monitoring and enforcement.
- id: EFF-03
  name: Modular trust-framework and governance metamodels
  examples:
  - Pan-Canadian Trust Framework
  - Trust Over IP governance specifications
  use: Modular components, controlled documents, role separation and reusable governance structure.
- id: EFF-04
  name: Assurance, risk and management-system standards
  examples:
  - NIST SP 800-63
  - NIST CSF
  - ISO IEC 27001
  - ISO IEC 42001
  - ISACA DTEF
  use: Assurance levels, risk treatment, controls, auditability and management-system discipline.
- id: EFF-05
  name: Sector operational frameworks
  examples:
  - Open Banking UK
  - Australian Consumer Data Right
  - FDX
  - Brazilian Open Finance
  use: Participant certification, API security, consent, service levels and incident obligations.
- id: EFF-06
  name: Digital public infrastructure ecosystems
  examples:
  - India Stack
  - e-Estonia
  - Singapore NDI
  - Bhutan NDI
  - gov.br
  use: Scale, integration, recovery, ecosystem operations and public-service delivery patterns.
- id: EFF-07
  name: Technical interoperability specifications
  examples:
  - W3C VC and DID
  - OpenID protocols
  - FIDO2
  - ISO mdoc
  - ETSI trusted lists
  use: Credential, authentication, federation, cryptographic and status interoperability selected by profiles.
patterns:
- id: EPA-001
  title: Independent conformity assessment
  source_families:
  - EFF-02
  - EFF-04
  destination: core
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - ConformanceClaim
  - EvidenceBundle
  - Assessor
  - AssuranceConclusion
  rationale: Separate self-assertion from independently evaluated conformance.
  safeguards: Preserve scheme-specific competence and legal requirements in profiles.
  evidence_required: Assessment lifecycle and one worked evidence-to-conclusion example.
- id: EPA-002
  title: Provider accreditation and certification lifecycle
  source_families:
  - EFF-02
  - EFF-05
  destination: profile
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - Participant
  - Service
  - Status
  - Suspension
  - Withdrawal
  rationale: Make admission, surveillance, suspension and exit explicit.
  safeguards: Do not imply statutory accreditation without an authorised scheme owner.
  evidence_required: Worked provider lifecycle and decision-right allocation.
- id: EPA-003
  title: Supervisory authority, public register and recognition status
  source_families:
  - EFF-01
  - EFF-02
  destination: profile
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - GoverningAuthority
  - SupervisoryAuthority
  - TrustRegistry
  - RecognitionDecision
  rationale: Connect governance decisions to publicly resolvable status and accountability.
  safeguards: Keep legal effect, liability and enforcement jurisdiction-specific.
  evidence_required: Institutional profile and registry/status workflow.
- id: EPA-004
  title: Controlled governance document set
  source_families:
  - EFF-03
  destination: core
  target_release: v0.6.0
  adoption_status: in_progress
  mapped_concepts:
  - ControlDocument
  - Policy
  - DecisionRight
  - ChangeRecord
  rationale: Make governance artefacts versioned, owned, reviewable and traceable.
  safeguards: Avoid importing external nomenclature where ONDTF concepts already exist.
  evidence_required: Controlled-document catalogue and change-control procedure.
- id: EPA-005
  title: Role-specific normative obligations
  source_families:
  - EFF-02
  - EFF-03
  - EFF-05
  destination: core
  target_release: v0.6.0
  adoption_status: evidence_available
  mapped_concepts:
  - Role
  - Duty
  - Requirement
  - EvidenceExpectation
  rationale: Convert architectural functions into testable responsibilities.
  safeguards: Distinguish universal obligations from profile-specific legal duties.
  evidence_required: Normative obligation catalogue with traceability.
- id: EPA-006
  title: Multi-dimensional assurance levels
  source_families:
  - EFF-04
  destination: core
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - IdentityAssurance
  - AuthorityAssurance
  - DelegationAssurance
  - OperationalAssurance
  - RemedyReadiness
  rationale: Avoid collapsing different assurance questions into one trust score.
  safeguards: Do not transplant thresholds without contextual calibration.
  evidence_required: Dimension definitions, level criteria and profile-selection rules.
- id: EPA-007
  title: Modular profile construction
  source_families:
  - EFF-03
  destination: core
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - JurisdictionProfile
  - SectorProfile
  - TechnologyProfile
  - Dependency
  rationale: Allow selective adoption without fragmenting the core architecture.
  safeguards: Define precedence, conflict resolution and version compatibility.
  evidence_required: Profile template and validation checklist.
- id: EPA-008
  title: Sector participant and service obligations
  source_families:
  - EFF-05
  destination: profile
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - ParticipantRole
  - ServiceLevel
  - ConsentRecord
  - IncidentObligation
  rationale: Make ONDTF usable in regulated operational ecosystems.
  safeguards: Reference existing sector protocols rather than duplicating them.
  evidence_required: One worked sector profile.
- id: EPA-009
  title: Cross-framework recognition profile
  source_families:
  - EFF-01
  - EFF-03
  - EFF-07
  destination: profile
  target_release: v0.8.0
  adoption_status: candidate
  mapped_concepts:
  - RecognitionDecision
  - Equivalence
  - Scope
  - Exclusion
  - Liability
  rationale: Express how assurance from another framework is accepted without asserting universal equivalence.
  safeguards: Require legal basis, scope, status, suspension and dispute handling.
  evidence_required: Bilateral or multi-framework recognition example.
  status: evidence_available
- id: EPA-010
  title: Accessible challenge, appeal and remedy operations
  source_families:
  - EFF-01
  - EFF-02
  destination: core
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - AffectedParty
  - Notice
  - Challenge
  - Appeal
  - Remedy
  rationale: Treat redress as part of the trust system rather than an external complaint channel.
  safeguards: Preserve procedural rights and local legal remedies in jurisdiction profiles.
  evidence_required: End-to-end pilot journey and accessibility review.
- id: EPA-011
  title: Consent and authorisation evidence for data exchange
  source_families:
  - EFF-05
  - EFF-06
  destination: profile
  target_release: v0.6.0
  adoption_status: candidate
  mapped_concepts:
  - AuthorityGrant
  - ConsentRecord
  - Purpose
  - DataAccessDecision
  rationale: Connect consent and authorisation to scope, evidence, expiry and revocation.
  safeguards: Do not treat consent as the only lawful basis or as blanket authority.
  evidence_required: Sector-specific transaction flow and revocation test.
- id: EPA-012
  title: Privacy-preserving status and registry resolution
  source_families:
  - EFF-07
  destination: implementation_guidance
  target_release: v0.7.0
  adoption_status: evaluate
  mapped_concepts:
  - Status
  - RegistryQuery
  - CorrelationRisk
  - Freshness
  rationale: Balance status freshness and interoperability against query leakage and correlation.
  safeguards: Evaluate multiple mechanisms and avoid universal protocol selection in the core.
  evidence_required: Comparative privacy and performance evaluation.
- id: EPA-013
  title: Executable conformance fixtures
  source_families:
  - EFF-04
  - EFF-05
  - EFF-07
  destination: implementation_guidance
  target_release: v0.7.0
