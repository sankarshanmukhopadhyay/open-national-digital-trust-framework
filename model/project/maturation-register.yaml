schema_version: 1.0
framework_version: 0.6.0
status: active
last_reviewed: '2026-07-24'
purpose: Canonical register connecting disclosed framework boundaries, unresolved maturity issues, maturation programmes,
  external-framework patterns, release gates and required evidence for the path from the v0.6.0 Operational Framework
  Draft to Candidate Specification status.
boundary_types:
  enduring: A deliberate framework boundary that should remain visible and is not expected to disappear.
  reducible: A maturity constraint that can be reduced through implementation, evidence or review.
  maintained: A continuing governance risk requiring periodic review and change control.
limitations:
- id: LIM-01
  title: Independent implementation evidence remains limited
  type: reducible
  consequence: Claims of portability, implementability and interoperability remain provisional.
  mitigation: Use reference artefacts as design guidance and record implementation deviations.
  linked_issues:
  - URI-01
- id: LIM-02
  title: Standards mappings are informative unless selected by a profile
  type: enduring
  consequence: A mapping alone does not create a normative dependency or conformance obligation.
  mitigation: Profiles must identify selected standards, editions, options and precedence rules.
  linked_issues:
  - URI-07
  - URI-19
- id: LIM-03
  title: Jurisdiction profiles are implementation aids, not legal advice
  type: enduring
  consequence: Adoption without competent local review may misstate legal effect or institutional authority.
  mitigation: Apply the jurisdiction-profile assurance stages and record legal cut-off dates.
  linked_issues:
  - URI-03
- id: LIM-04
  title: Quantitative thresholds require contextual calibration
  type: reducible
  consequence: Default values may not represent sector risk, operational conditions or acceptable uncertainty.
  mitigation: Treat thresholds as profile-governed parameters and retain source evidence and confidence ranges.
  linked_issues:
  - URI-02
- id: LIM-05
  title: Reference schemas and fixtures are not production software
  type: enduring
  consequence: Repository artefacts do not establish security, availability or implementation fitness.
  mitigation: Classify artefacts by maturity and validate production implementations independently.
  linked_issues:
  - URI-04
- id: LIM-06
  title: Cross-border recognition depends on external legal and institutional arrangements
  type: enduring
  consequence: Technical compatibility does not create recognition, liability allocation or legal effect.
  mitigation: Use recognition profiles that record authority, scope, equivalence, exclusions and dispute handling.
  linked_issues:
  - URI-16
- id: LIM-07
  title: Cryptographic and protocol choices remain profile-dependent
  type: enduring
  consequence: Core conformance does not imply protocol or cryptographic interoperability.
  mitigation: Technology profiles must declare versions, suites, status mechanisms and transition rules.
  linked_issues:
  - URI-05
  - URI-12
- id: LIM-08
  title: Repository validation is not implementation or scheme conformance
  type: enduring
  consequence: Passing repository checks cannot support a provider, product or organisational conformance claim.
  mitigation: Use an adopted assessment scheme with evidence, assessor competence and lifecycle controls.
  linked_issues:
  - URI-04
  - URI-09
- id: LIM-09
  title: Standards and regulatory sources change over time
  type: maintained
  consequence: Profiles and mappings may become stale or materially inaccurate.
  mitigation: Operate the reference-maintenance policy and trigger impact review when sources change.
  linked_issues:
  - URI-07
  - URI-18
