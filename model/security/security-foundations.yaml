trust_assumptions:
  - {id: TA-01, name: Governance authority is legitimate and current}
  - {id: TA-02, name: Administrative privilege is exercised as authorised}
  - {id: TA-03, name: Issuers and evidence providers remain competent and uncompromised}
  - {id: TA-04, name: Registries and status services are sufficiently current}
  - {id: TA-05, name: Policy evaluation matches authorised policy intent}
  - {id: TA-06, name: Cryptographic protection remains suitable}
  - {id: TA-07, name: Technical dependencies do not exceed their declared role}
  - {id: TA-08, name: External domains mean what the recognition mapping says they mean}
  - {id: TA-09, name: Decision evidence remains available and trustworthy}
  - {id: TA-10, name: Affected parties can use the redress mechanism}
  - {id: TA-11, name: Automated agents remain within mandate}
  - {id: TA-12, name: Security controls do not create disproportionate harm}
