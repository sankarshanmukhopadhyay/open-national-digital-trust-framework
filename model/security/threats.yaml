threats:
- id: THR-001
  title: Mandate fabrication
  description: An adversary causes or exploits mandate fabrication so that a trust-system outcome is no longer authorised,
    evidence-based, reviewable, or recoverable.
  category_ref: THCAT-01
  adversary_refs:
  - ADV-08
  asset_refs:
  - AST-01
  boundary_refs:
  - SB-01
  attack_surface_refs:
  - AS-01
  domain_refs:
  - SEC-DOM-01
  objective_refs:
  - SEC-OBJ-02
  - SEC-OBJ-05
  - SEC-OBJ-07
  assumption_refs:
  - TA-01
  preconditions:
  - Relevant access, influence, or dependency exists
  attack_sequence:
  - Establish position or influence
  - Exploit the relevant boundary or surface
  - Cause an invalid or concealed trust-system state
  - Seek persistence or suppress review
  consequences:
  - Unauthorised or unsafe outcome
  - Loss of evidence or accountability
  - Potential harm to affected parties
  detection_indicators:
  - Unexpected state transition
  - Mismatch between authority, evidence, policy, and effect
  - Anomalous administrative or resolution activity
  risk_factors:
    likelihood_factors:
    - access
    - capability
    - exposure
    - detectability
    impact_dimensions:
    - rights
    - financial
    - service
    - privacy
    - institutional
    uncertainty: to-be-assessed
  candidate_control_families:
  - CTL-FAM-01
  - CTL-FAM-06
