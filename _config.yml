title: Open National Digital Trust Framework
short_title: ONDTF
description: Jurisdiction-neutral, open standards-based framework for national digital
  trust infrastructure.
url: https://sankarshanmukhopadhyay.github.io
baseurl: /open-national-digital-trust-framework
repository: sankarshanmukhopadhyay/open-national-digital-trust-framework
theme: just-the-docs
color_scheme: light
search_enabled: true
heading_anchors: true
mermaid:
  version: 11.4.1
aux_links:
  ONDTF on GitHub:
  - https://github.com/sankarshanmukhopadhyay/open-national-digital-trust-framework
aux_links_new_tab: true
plugins:
- jekyll-seo-tag
exclude:
- scripts
- tests
- vendor
- node_modules
- Gemfile.lock
- package-lock.json
- package.json
- Makefile
- artifacts
- bindings
- model
- governance
- data
- '*.zip'
defaults:
- scope:
    path: docs
    type: pages
  values:
    layout: default
- scope:
    path: profiles
    type: pages
  values:
    layout: default
gh_edit_link: true
gh_edit_link_text: Suggest an improvement to this page on GitHub.
gh_edit_repository: https://github.com/sankarshanmukhopadhyay/open-national-digital-trust-framework
gh_edit_branch: main
gh_edit_view_mode: edit
